- name: dcpy
  calls: [
    "dcpy/test -s --verbose --verbose --ignore dcpy/test/library --cov-config=pyproject.toml --cov=dcpy --cov-report=xml",
    "dcpy/test/library -s --verbose --verbose --cov-config=pyproject.toml --cov=dcpy --cov-report=xml --cov-append",]
- name: checkbook
  db: db-checkbook
  calls: ["./products/checkbook -s --verbose --verbose"]
- name: zap
  working-directory: products/zap-opendata
  calls:
    - "-m 'not end_to_end' -s --verbose --verbose --durations=0 --cov ."
    - "-m 'end_to_end' -s --verbose --verbose --durations=0 --cov ."
- name: qa
  working-directory: apps/qa
  calls: ["."]
