# Override for local development
# Usage: docker-compose -f docker-compose.yml -f docker-compose.local.yml up

services:
  qa-streamlit:
    volumes:
      # Mount local repo instead of using shared volume; product-metadata lives inside it
      - ${DATA_ENGINEERING_PATH:-..}:/repos/data-engineering

  dagster:
    ports:
      - "3000:3000"
    volumes:
      # Mount local repos instead of using shared volume (mount parent to get dcpy)
      - ${DATA_ENGINEERING_PATH:-..}:/app/repos/data-engineering
      - ${DATA_ENGINEERING_PATH:-..}/apps/dagster:/app/dagster
      - dagster-storage:/opt/dagster/dagster_home

  dagster-daemon:
    volumes:
      # Mount local repos for daemon as well
      - ${DATA_ENGINEERING_PATH:-..}:/app/repos/data-engineering
      - ${DATA_ENGINEERING_PATH:-..}/apps/dagster:/app/dagster
      - dagster-storage:/opt/dagster/dagster_home

  nginx:
    ports:
      # Use standard ports for local dev
      - "8080:80"
      - "8443:443"
