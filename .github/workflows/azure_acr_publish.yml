name: Azure ACR - Build and Publish App Images
on:
  workflow_dispatch:
    inputs:
      push_to_acr:
        description: "Push image to Azure Container Registry"
        type: boolean
        required: true
        default: true

env:
  IMAGE_NAME: de-apps

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load Secrets
        uses: 1password/load-secrets-action@v1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AZURE_ACR_USERNAME: "op://Data Engineering/de_az_acr/username"
          AZURE_ACR_PASSWORD: "op://Data Engineering/de_az_acr/password"
          AZURE_ACR_LOGIN_SERVER: "op://Data Engineering/de_az_acr/login_server"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        if: inputs.push_to_acr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_ACR_LOGIN_SERVER }}
          username: ${{ env.AZURE_ACR_USERNAME }}
          password: ${{ env.AZURE_ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          cd apps
          docker build \
            -f docker/Dockerfile \
            -t ${{ env.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to ACR
        if: inputs.push_to_acr
        run: |
          docker push ${{ env.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Image info
        run: |
          echo "Image built: ${{ env.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"
          echo "Image size: $(docker images ${{ env.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest --format '{{.Size}}')"
