id: panynj_lga_65db
acl: public-read

attributes:
  name: LaGuardia Airport Noise Contour (65 dB)
  description: >
    Continuous contour of the Day Night Average Sound Level (DNL) of at least 65 dB for
    LaGuardia Airport (LGA).

    Data provided by the Port Authority of New York & New Jersey.
  url: https://aircraftnoise.panynj.gov/

ingestion:
  target_crs: EPSG:4326
  source:
    type: s3
    bucket: edm-recipes
    key: inbox/panynj_lga_65db/{{ version }}/lga_65db.zip
  file_format:
    type: shapefile
    unzipped_filename: lga_65db.shp
    crs: EPSG:2263
  processing_steps:
  - name: clean_column_names
    args: { "replace": { " ": "_" }, "lower": True }
  - name: rename_columns
    args:
      map: { "geom": "wkb_geometry" }
