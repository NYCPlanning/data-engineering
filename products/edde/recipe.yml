name: EDDE
version: "{{ BUILD_ENV_EDDE_VERSION }}"
vars:
  BUILD_ENV_EDDE_VERSION_PREV: "{{ BUILD_ENV_EDDE_VERSION_PREV }}"
  BUILD_ENV_EDDE_VERSION: "{{ BUILD_ENV_EDDE_VERSION }}"
  BUILD_ENV_EDDE_CENSUS_BASE_YEAR: "{{ BUILD_ENV_EDDE_CENSUS_BASE_YEAR }}"
  BUILD_ENV_EDDE_ACS_PREV_YEAR_BAND: "{{ BUILD_ENV_EDDE_ACS_PREV_YEAR_BAND }}"
  BUILD_ENV_EDDE_ACS_CURRENT_YEAR_BAND: "{{ BUILD_ENV_EDDE_ACS_CURRENT_YEAR_BAND }}"
product: db-eddt
inputs:
  dataset_defaults:
    file_type: parquet
    destination: file
  datasets:
# From the spreadsheet
  # Ingested
  - name: edde
    version: latest
    source: edm.publishing.published

  - name: doi_evictions_geocoded # 3.09 (geocoded version)
    version: latest
  - name: hpd_hny_units_by_building # 3.11, 4.02
    version: '20260519'
  - name: dcp_housing # 4.01
    version: '25Q4'
  - name: lpc_historic_district_areas # 4.03
    version: '20260202'
  - name: dhs_shelterd_indiv_by_comm_dist # 3.1
    version: 20260504

  - name: dcp_pumas2020
    version: '20260526'
  - name: dcp_population_cd_puma_crosswalk_2020
    version: '2025'
  - name: dcp_population_nta_puma_crosswalk_2020
    version: '2025'

  # A decade of traffic injury data # 5.15
  - name: dcp_dot_trafficinjuries
    version: 2010
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2011
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2012
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2013
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2014
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2015
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2016
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2017
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2018
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2019
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2020
    file_type: csv

custom:
  ignored_indicators:
    - health_diabetes
    - health_self_reported
    - health_selfreportedhealth

  health_mortality:
    latest_year: "1620"
    puma_baseline_years: ["0004", "1014"]
    baseline_years: ["2000", "2010"]

  traffic_fatalities:
    year_ranges:
      "1014": [2010, 2015]
      "1620": [2016, 2021]

  dhs_shelter:
    years: ["2020", "2025"]

stage_config:
  builds.build:
    commands:
      - name: Housing & Quality of Life Indicators
        run: python3 -m build housing_security all
      - name: Housing Production Indicators
        run: python3 -m build housing_production all
      - name: Quality of Life Indicators
        run: python3 -m build quality_of_life all
      - name: Census Base Demographics & Economics
        run: python3 -m build all all {{ BUILD_ENV_EDDE_CENSUS_BASE_YEAR }}
      - name: ACS Prev Demographics & Economics
        run: python3 -m build all all {{ BUILD_ENV_EDDE_ACS_PREV_YEAR_BAND }}
      - name: ACS Current Demographics & Economics
        run: python3 -m build all all {{ BUILD_ENV_EDDE_ACS_CURRENT_YEAR_BAND }}
    destination: edm.publishing.builds
    destination_key: db-eddt
    connector_args:
      - name: acl
        value: public-read
      - name: build_note
        value: ar-eddt-2026
