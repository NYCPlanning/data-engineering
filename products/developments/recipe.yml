name: Developments
product: db-developments
version_strategy: 
  bump_latest_release: 2
vars:
  GEOSUPPORT_VERSION: 26b
  CAPTURE_DATE: 07-01-2026
  CAPTURE_DATE_PREV: 01-01-2026

inputs:
  missing_versions_strategy: find_latest
  datasets:
    - name: dcp_cdboundaries
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_cb2020
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_ct2020
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_cdta2020
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_nta2020
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_school_districts
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_boroboundaries_wi
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_councildistricts
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_firecompanies
      version_env_var: GEOSUPPORT_VERSION
    - name: dcp_policeprecincts
      version_env_var: GEOSUPPORT_VERSION
    - name: doitt_zipcodeboundaries
      version: 20180910
    - name: dof_shoreline
      version: 20220429
    - name: dcp_mappluto_wi
      version: 25v3
    - name: doe_eszones
    - name: doe_mszones
    - name: doe_school_subdistricts
    # Pinned together: hny_geocode_results.uid joins to hpd_hny_units_by_building.ogc_fid,
    # a serial assigned at load time. The two must come from the same source version or
    # the join in _hny_match.sql silently matches the wrong rows.
    - name: hpd_hny_units_by_building
      version: "20260721_internal"
    - name: hny_geocode_results
      version: "20260721_internal"
    - name: hpd_historical_units_by_building
    - name: hpd_historical_geocode_results
    - name: dob_now_applications
    - name: dob_now_permits
    - name: dob_cofos
    - name: dob_now_cofos
    - name: doitt_buildingfootprints
    - name: doitt_buildingfootprints_historical
    - name: dcp_censusdata
      version: "2020"
    - name: dcp_censusdata_blocks
      version: "2020"
    - name: dob_bis_permits
    - name: dob_bis_applications
    - name: dob_jobapplications_parkingspaces
      version: 20240603
    - id: db-developments
      source: edm.publishing.published
      file_type: csv
      import_as: qaqc_historic
      custom:
        filepath: qaqc_historic.csv
