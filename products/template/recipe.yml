name: Template DB
product: template
version: 24Q3
env:
  BUILD_ENGINE_DB: db-template

inputs:
  datasets:
    - name: nypl_libraries
      version: 20240105
    - name: bpl_libraries
      version: 20240105
    - name: qpl_libraries
    - name: dpr_parksproperties
    - name: dpr_greenthumb
    - name: lpc_landmarks
    - name: lion.borough_boundaries
      source: bytes
      file_type: shapefile
      destination: file
      custom:
        file_id: shapefile
  missing_versions_strategy: find_latest

stage_config:
  builds.build:
    env:
      BUILD_ENGINE_DB: db-template
    commands:
    - name: transform
      run: python3 build_scripts/transform.py
      command_type: shell
    - name: generate_metadata
      run: build_scripts.export:generate_data_dictionaries
      command_type: python
    - name: generate_socrata_package
      run: build_scripts.export:generate_socrata_package
      command_type: python
    destination: edm.publishing.builds
    destination_key: db-template
    connector_args:
      - name: acl
        value: public-read

exports:
  zip_name: output
  datasets:
  - name: templatedb
    format: csv
  - name: templatedb
    format: parquet
  - name: templatedb
    format: shp
    filename: templatedb_points.shp.zip
    custom:
      geom_column: wkb_geometry
      geometry_type: points
  - name: templatedb
    format: shp
    filename: templatedb_polygons.zip
    custom:
      geom_column: wkb_geometry
      geometry_type: polygons
  - name: templatedb
    format: gdb
    filename: templatedb.zip
    custom:
      geom_column: wkb_geometry
      geometry_type: points
      layer: templatedb_points
  - name: templatedb
    format: gdb
    filename: templatedb.zip
    custom:
      geom_column: wkb_geometry
      geometry_type: polygons
      layer: templatedb_polygons

distribution:
  destination_ids:
  - template_db.template_db.socrata
