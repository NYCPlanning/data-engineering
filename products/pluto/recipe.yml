name: Pluto Major
version_strategy: bump_latest_release
version_type: major
product: db-pluto
inputs:
  missing_versions_strategy: find_latest
  datasets:
    - name: dcp_councildistricts_wi
    - name: dcp_cb2010_wi
    - name: dcp_cb2020_wi
    - name: dcp_cdboundaries_wi
    - name: dcp_colp
    - name: dcp_commercialoverlay
    - name: dcp_ct2010_wi
    - name: dcp_ct2020_wi
    - name: dcp_developments # only used for data tests
    - name: dcp_edesignation
    - name: dcp_firecompanies
    - name: dcp_gis_mandatory_inclusionary_housing
    - name: dcp_transit_zones
    - name: dcp_healthareas
    - name: dcp_healthcenters
    - name: dcp_limitedheight
    - name: dcp_pluto
      # this env var is set in dcpy/builds/plan.py in a slightly hacky way for now
      version_env_var: VERSION_PREV
      import_as: previous_pluto
    - name: dcp_policeprecincts
    - name: dcp_school_districts
    - name: dcp_specialpurpose
    - name: dcp_specialpurposesubdistricts
    - name: dcp_zoningdistricts
    - name: dcp_zoningmapamendments
    - name: dcp_zoningmapindex
    - name: dof_condo
    - name: dof_dtm
    - name: dof_shoreline
    - name: doitt_zipcodeboundaries
    - name: dpr_greenthumb
    - name: dsny_frequencies
    - name: fema_firms2007_100yr
    - name: fema_pfirms2015_100yr
    - name: lpc_historic_districts
    - name: lpc_landmarks
    - name: pluto_input_cama_dof
    - name: pluto_input_geocodes
    - name: pluto_input_numbldgs
    - name: pluto_pts

stage_config:
  builds.build:
    commands:
      - name: setup
        run: bash pluto_build/00_setup.sh
        command_type: shell

      - name: dbt_staging
        run: bash pluto_build/01a_dbt_staging.sh
        command_type: shell

      - name: build
        run: bash pluto_build/02_build.sh
        command_type: shell

      - name: corrections
        run: bash pluto_build/03_corrections.sh
        command_type: shell

      - name: archive
        run: bash pluto_build/04_archive.sh
        command_type: shell

      - name: qaqc
        run: bash pluto_build/05_qaqc.sh
        command_type: shell

      - name: custom_qaqc
        run: bash pluto_build/07_custom_qaqc.sh
        command_type: shell
