name: Deploy DE Tools to DO

on:
  workflow_dispatch:
    inputs:
      data_engineering_branch:
        description: 'Data Engineering branch to deploy'
        required: true
        default: 'main'
      product_metadata_branch:
        description: 'Product Metadata branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-22.04
    env:
      DATA_ENGINEERING_BRANCH: ${{ github.event.inputs.data_engineering_branch || 'main' }}
      PRODUCT_METADATA_BRANCH: ${{ github.event.inputs.product_metadata_branch || 'main' }}
      QA_DROPLET_SSH_PRIVATE_KEY: ${{ secrets.QA_DROPLET_SSH_PRIVATE_KEY }}
      QA_DROPLET_SSH_HOST: ${{ secrets.QA_DROPLET_SSH_HOST }}

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$QA_DROPLET_SSH_PRIVATE_KEY" > ~/.ssh/droplet.key
          chmod 400 ~/.ssh/droplet.key
          cat >> ~/.ssh/config <<EOF
          Host droplet
            HostName $QA_DROPLET_SSH_HOST
            User root
            IdentityFile ~/.ssh/droplet.key
            StrictHostKeyChecking no
            ConnectTimeout 600
          EOF

      - name: Pull latest data-engineering code on droplet
        run: |
          ssh droplet "\
            cd /root/data-engineering && \
            git fetch origin $DATA_ENGINEERING_BRANCH --depth 1 && \
            git reset --hard FETCH_HEAD"

      - name: Clone/update product-metadata on droplet
        run: |
          ssh droplet "\
            if [ ! -d /root/product-metadata/.git ]; then
              echo 'Cloning product-metadata...';
              git clone --depth 1 --branch $PRODUCT_METADATA_BRANCH https://github.com/NYCPlanning/product-metadata.git /root/product-metadata;
            else
              echo 'Updating product-metadata...';
              cd /root/product-metadata;
              git fetch origin $PRODUCT_METADATA_BRANCH --depth 1;
              git reset --hard FETCH_HEAD;
            fi"

      - name: Deploy services
        run: |
          ssh droplet "\
            cd /root/data-engineering/apps && \
            export OP_SERVICE_ACCOUNT_TOKEN='${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}' && \
            op run --env-file=env.1pw -- ./scripts/deploy.sh"

      - name: Verify deployment
        run: |
          ssh droplet "\
            cd /root/data-engineering/apps && \
            docker compose ps && \
            docker compose logs --tail=50"
