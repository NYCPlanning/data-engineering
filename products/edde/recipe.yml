name: EDDE
version: {{ BUILD_ENV_EDDE_VERSION }}
vars:
  BUILD_ENV_EDDE_VERSION_PREV: {{ BUILD_ENV_EDDE_VERSION_PREV }}
  BUILD_ENV_EDDE_VERSION: {{ BUILD_ENV_EDDE_VERSION }}
  BUILD_ENV_EDDE_CENSUS_BASE_YEAR: {{ BUILD_ENV_EDDE_CENSUS_BASE_YEAR }}
  BUILD_ENV_EDDE_ACS_START_YEAR: {{ BUILD_ENV_EDDE_ACS_START_YEAR }}
  BUILD_ENV_EDDE_ACS_END_YEAR: {{ BUILD_ENV_EDDE_ACS_END_YEAR }}
product: db-eddt
inputs:
  dataset_defaults:
    file_type: parquet
    destination: file
  datasets:
# From the spreadsheet
  # Ingested
  - name: doi_evictions # 3.09
    version: 20250423
  - name: hpd_hny_units_by_building # 3.11, 4.02
    version: 20250303
  - name: dcp_housing # 4.01
    version: '24Q4'
  - name: lpc_historic_district_areas # 4.03
    version: 20250423
  - name: dhs_shelterd_indiv_by_comm_dist # 3.1
    version: '2025.1'

  - name: dcp_pumas2020
    version: '20241218'
  - name: dcp_population_cd_puma_crosswalk_2020
    version: '2025'
  - name: dcp_population_nta_puma_crosswalk_2020
    version: '2025'

  # A decade of traffic injury data # 5.15
  - name: dcp_dot_trafficinjuries
    version: 2010
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2011
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2012
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2013
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2014
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2015
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2016
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2017
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2018
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2019
    file_type: csv
  - name: dcp_dot_trafficinjuries
    version: 2020
    file_type: csv

stage_config:
  builds.build:
    commands:
      - name: All Indicators
        run: python3 -m external_review.external_review_collate all
      - name: Census Base
        run: python3 -m external_review.collate_save_census {{ BUILD_ENV_EDDE_CENSUS_BASE_YEAR }}
      - name: ACS Start
        run: python3 -m external_review.collate_save_census {{ BUILD_ENV_EDDE_ACS_START_YEAR }}
      - name: ACS End
        run: python3 -m external_review.collate_save_census {{ BUILD_ENV_EDDE_ACS_END_YEAR }}
    destination: edm.publishing.builds
    destination_key: db-eddt
    connector_args:
      - name: acl
        value: public-read
      - name: build_note
        value: ar-eddt-2026
