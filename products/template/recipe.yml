name: Template DB
product: template
version: 24Q3

inputs:
  datasets:
    - name: nypl_libraries
      version: 20240105
    - name: bpl_libraries
      version: 20240105
    - name: qpl_libraries
    - name: dpr_parksproperties
    - name: dpr_greenthumb
    - name: lpc_landmarks
    - name: lion.borough_boundaries
      source: bytes
      file_type: shapefile
      destination: file
      custom:
        file_id: shapefile
  missing_versions_strategy: find_latest

exports:
  # TODO add feature to export metadata files here or implicitly
  output_folder: output
  zip_name: output
  datasets:
  - name: templatedb
    format: csv
  - name: templatedb
    format: parquet
  - name: templatedb
    format: shp
    filename: templatedb_points.zip
    custom:
      geom_column: wkb_geometry
      geometry_type: points
  - name: templatedb
    format: shp
    filename: templatedb_polygons.zip
    custom:
      geom_column: wkb_geometry
      geometry_type: polygons
  - name: templatedb
    format: gdb
    filename: templatedb.zip
    custom:
      geom_column: wkb_geometry
      geometry_type: points
      layer: templatedb_points
  - name: templatedb
    format: gdb
    filename: templatedb.zip
    custom:
      geom_column: wkb_geometry
      geometry_type: polygons
      layer: templatedb_polygons
