exports:
  output_folder: output
  zip_name: output
  datasets:
  # GeoSupport LION
  - name: manhattan_lion_dat
    filename: ManhattanLION.dat
    format: dat
    custom: { formatting: lion_dat }
  - name: bronx_lion_dat
    filename: BronxLION.dat
    format: dat
    custom: { formatting: lion_dat }
  - name: brooklyn_lion_dat
    filename: BrooklynLION.dat
    format: dat
    custom: { formatting: lion_dat }
  - name: queens_lion_dat
    filename: QueensLION.dat
    format: dat
    custom: { formatting: lion_dat }
  - name: staten_island_lion_dat
    filename: StatenIslandLION.dat
    format: dat
    custom: { formatting: lion_dat }

  # SAF
  - name: saf_abcegnpx_generic
    filename: GenericABCEGNPX.txt
    format: dat
    custom: { formatting: saf_a }
  - name: saf_abcegnpx_roadbed
    filename: RoadbedABCEGNPX.txt
    format: dat
    custom: { formatting: saf_a }
  - name: saf_d_generic
    filename: GenericD.txt
    format: dat
    custom: { formatting: saf_d }
  - name: saf_d_roadbed
    filename: RoadbedD.txt
    format: dat
    custom: { formatting: saf_d }
  - name: saf_i
    filename: Intersection.txt
    format: dat
    custom: { formatting: saf_i }
  - name: saf_ov_generic
    filename: GenericOV.txt
    format: dat
    custom: { formatting: saf_v }
  - name: saf_ov_roadbed
    filename: RoadbedOV.txt
    format: dat
    custom: { formatting: saf_v }
  - name: saf_s_generic
    filename: GenericS.txt
    format: dat
    custom: { formatting: saf_s }
  - name: saf_s_roadbed
    filename: RoadbedS.txt
    format: dat
    custom: { formatting: saf_s }

  # SEDAT
  - name: sedat
    filename: SEDAT.txt
    format: dat
    custom: { formatting: sedat }
  - name: special_sedat
    filename: SpecialSEDAT.txt
    format: dat
    custom: { formatting: sedat }

  # SND, Geosupport Normalizing Tables
  - name: snd
    filename: SND.txt
    format: dat
    custom: { formatting: snd }
  - name: exception
    filename: Exception.txt
    format: dat
  - name: universal_word
    filename: Universal.txt
    format: csv
    custom:
      header: False
      line_endings: crlf
  - name: last_word
    filename: LastWord.txt
    format: csv
    custom:
      header: False
      line_endings: crlf
  - name: enders
    filename: Enders.txt
    format: dat

  # Face Code
  - name: manhattan_face_code
    filename: ManhattanFace.txt
    format: dat
    custom: { formatting: face_code }
  - name: bronx_face_code
    filename: BronxFace.txt
    format: dat
    custom: { formatting: face_code }
  - name: brooklyn_face_code
    filename: BrooklynFace.txt
    format: dat
    custom: { formatting: face_code }
  - name: queens_face_code
    filename: QueensFace.txt
    format: dat
    custom: { formatting: face_code }
  - name: staten_island_face_code
    filename: StatenIslandFace.txt
    format: dat
    custom: { formatting: face_code }

  # Other
  - name: rpl
    filename: RPL.txt
    format: dat
    custom: { formatting: rpl }

  # Log file
  - name: log
    filename: log.csv
    format: csv

  # Thin LION
  - name: thinlion_all
    filename: nyc.thinlion
    format: dat
    custom: { formatting: thinlion_dat }
  - name: thinlion_bronx
    filename: BronxThinLION.txt
    format: dat
    custom: { formatting: thinlion_dat }
  - name: thinlion_brooklyn
    filename: BrooklynThinLION.txt
    format: dat
    custom: { formatting: thinlion_dat }
  - name: thinlion_manhattan
    filename: ManhattanThinLION.txt
    format: dat
    custom: { formatting: thinlion_dat }
  - name: thinlion_queens
    filename: QueensThinLION.txt
    format: dat
    custom: { formatting: thinlion_dat }
  - name: thinlion_statenisland
    filename: StatenIslandThinLION.txt
    format: dat
    custom: { formatting: thinlion_dat }

  # Thin Fire
  - name: thinfire_bronx
    filename: BronxThinFire.txt
    format: dat
    custom: { formatting: thinfire_dat }
  - name: thinfire_brooklyn
    filename: BrooklynThinFire.txt
    format: dat
    custom: { formatting: thinfire_dat }
  - name: thinfire_manhattan
    filename: ManhattanThinFire.txt
    format: dat
    custom: { formatting: thinfire_dat }
  - name: thinfire_queens
    filename: QueensThinFire.txt
    format: dat
    custom: { formatting: thinfire_dat }
  - name: thinfire_statenisland
    filename: StatenIslandThinFire.txt
    format: dat
    custom: { formatting: thinfire_dat }

  # Thin Election District
  - name: thined_dat
    filename: thined.txt
    format: dat
    custom: { formatting: thined_dat }

  # CDTA 2020
  - name: cdta2020_dat
    filename: CDTA2020.txt
    format: dat
    custom: { formatting: cdta2020_dat }
  - name: cdta2020_csv
    filename: CDTA2020.csv
    format: csv
    custom:
      line_endings: crlf

  # NTA 2020
  - name: nta2020_dat
    filename: NTA2020.txt
    format: dat
    custom: { formatting: nta2020_dat }
  - name: nta2020_csv
    filename: NTA2020.csv
    format: csv
    custom:
      line_endings: crlf

  # NTA 2010
  - name: nta2010_csv
    filename: NTA.csv
    format: csv
    custom:
      line_endings: crlf
  - name: nta2010_txt
    filename: NTA.txt
    format: dat

  # ESRI / published LION geodatabase — filename must match `version:` at top of this file
  - name: gdb_lion
    filename: nyclion_26b.zip
    format: gdb
    custom: { layer: lion, geometry_type: lines }
  - name: gdb_node
    filename: nyclion_26b.zip
    format: gdb
    custom: { layer: node, geometry_type: points }
  - name: gdb_node_stname
    filename: nyclion_26b.zip
    format: gdb
    custom: { layer: node_stname }
  - name: gdb_altnames
    filename: nyclion_26b.zip
    format: gdb
    custom: { layer: altnames }

  # District boundary geodatabase (ETL spec ch. 10, table 39)
  # filename must match prod's, which embeds the cycle from `version:` above
