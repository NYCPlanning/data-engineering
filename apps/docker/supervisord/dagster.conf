[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
user=root

[program:dagster-webserver]
command=dagster-webserver -h 0.0.0.0 -p 3000 -w workspace.yaml --path-prefix /dag
directory=/app/repos/data-engineering/apps/dagster
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=30

[program:dagster-daemon]
command=dagster-daemon run
directory=/app/repos/data-engineering/apps/dagster
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=30

[program:reload-loop]
command=/app/docker/scripts/reload-loop.sh
environment=RELOAD_COMMAND="supervisorctl restart dagster-webserver dagster-daemon",RELOAD_INTERVAL="60"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
