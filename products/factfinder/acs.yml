name: PFF - ACS
version: 2024
product: db-factfinder
inputs:
  dataset_defaults:
    file_type: parquet
    destination: df
  datasets:
    - name: dcp_pop_acs2010_demographic
      version: 20240524
    - name: dcp_pop_acs2010_economic
      version: 20240524
    - name: dcp_pop_acs2010_housing
      version: 202502
    - name: dcp_pop_acs2010_social
      version: 20240524
    - name: dcp_pop_acs
      version: 2024
      destination: file
      file_type: xlsx
  missing_versions_strategy: find_latest

stage_config:
  builds.build:
    destination: edm.publishing.builds
    destination_key: db-factfinder
    connector_args:
      - name: acl
        value: public-read
