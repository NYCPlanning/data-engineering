name: fisa_dailybudget
acl: private
source:
  type: local_file
  path: .library/upload/AIBL_DLY_BUD_96L1.asc
file_format:
  type: csv 
  delimiter: "|"
  column_names:
  - rcat_cd
  - rcls_cd
  - atyp_cd
  - mng_dpt_cd
  - cptl_proj_id
  - bud_obj_cd
  - au_cd
  - fndg_dpt_cd
  - cmtmnt_am
  - oblgtns_am
  - adpt_am
  - penc_am
  - enc_am
  - acrd_exp_am
  - cash_exp_am
  - ucomit_am
  - actu_exp_am
  - tbl_last_dt
processing_steps:
- name: update_column
  args:
    column_name: fisa_version
    val: "{{ version }}"
- name: append_prev
- name: deduplicate
  args:
    sort_columns:
    - fisa_version
    - tbl_last_dt
    sort_ascending: True
    by:
    - rcat_cd
    - rcls_cd
    - atyp_cd
- name: sort
  args:
    by: [tbl_last_dt]

library_dataset:
  name: fisa_dailybudget
  version: ""
  acl: private
  source:
    script:
      path: .library/upload/AIBL_DLY_BUD_96L1_20240220010707.asc
      previous_version: 
    options:
      - "AUTODETECT_TYPE=NO"
      - "EMPTY_STRING_AS_NULL=YES"
    geometry:
      SRS: null
      type: NONE

  destination:
    geometry:
      SRS: null
      type: NONE
    options:
      - "OVERWRITE=YES"
      - "PRECISION=NO"
    fields: []
    sql: null

  info:
    description: |
      ### FISA Daily Budget Export
      received from OMB/Capital Planning via ftp
      currently, script assumes ALL historical files are in folder. At some point it'd make sense to
      - try to get ftp working programatically
      - only grab new data
      But right now it's simple enough to grab it all manually and run it through the script
    url:
    dependents: []
