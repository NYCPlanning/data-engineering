version: 2

models:
- name: thinfire_by_field
  columns:
    - name: fire_company_type
      data_type: string
      tests:
      - not_null
      - dbt_expectations.expect_column_value_lengths_to_equal:
          arguments: { value: 1 }
    - name: fire_company_number
      data_type: string
      tests:
      - not_null
      - dbt_expectations.expect_column_value_lengths_to_equal:
          arguments: { value: 3 }
    - name: borough
      data_type: string
      tests:
      - not_null
      - accepted_values:
          arguments:
            values: [ "1", "2", "3", "4", "5" ]

# Borough-specific filtered models
- name: thinfire_manhattan_by_field
- name: thinfire_bronx_by_field
- name: thinfire_brooklyn_by_field
- name: thinfire_queens_by_field
- name: thinfire_statenisland_by_field

# Borough export models with text output
- name: thinfire_manhattan
  columns: &dat_column_9
    - name: dat_column
      data_type: string
      tests:
      - dbt_expectations.expect_column_value_lengths_to_equal:
          arguments: { value: 9 }

- name: thinfire_bronx
  columns: *dat_column_9

- name: thinfire_brooklyn
  columns: *dat_column_9

- name: thinfire_queens
  columns: *dat_column_9

- name: thinfire_statenisland
  columns: *dat_column_9
