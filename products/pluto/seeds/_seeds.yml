version: 2

seeds:
  - name: ignored_bbls_for_unit_count_test
    description: |
      List of manually researched bbls that have correct count of residential units in DOF PTS data,
      despite failing `assert_condo_bbl_unit_count_research_required` test. These records are ignored
      during the test.
    config:
      column_types:
        bbl: text
        pluto_version: text
    
  - name: pluto_input_research
    description: Manual corrections and overrides for PLUTO data (27k rows)
    config:
      column_types:
        bbl: text
    columns:
      - name: bbl
        description: Borough-Block-Lot identifier
      - name: field
        description: Field being corrected
      - name: old_value
        description: Original value
      - name: new_value
        description: Corrected value
      - name: type
        description: Correction type
      - name: reason
        description: Reason for correction
      - name: version
        description: PLUTO version
  
  - name: dcp_zoning_maxfar
    description: Maximum Floor Area Ratio (FAR) by zoning district
  
  - name: dcp_transit_zone_ranks
    description: Transit zone priority rankings for assignment logic
    
  - name: pluto_input_condolot_descriptiveattributes
    description: Descriptive attributes for condo lots (8.3k rows)
    config:
      column_types:
        CondNO: text
        PARID: text
    
  - name: pluto_input_condo_bldgclass
    description: Condo building class codes
    
  - name: pluto_input_bsmtcode
    description: Basement type codes and classifications
    config:
      column_types:
        bsmnt_type: text
        bsmntgradient: text
        bsmtcode: text

  - name: pluto_input_landuse_bldgclass
    description: Building class to land use mapping
    config:
      column_types:
        landuse: text

  - name: lookup_bldgclass
    description: |
      Building class lookup table with descriptions. Is not used in PLUTO build.

  - name: dof_building_classifications_site
    description: |
      "Building classifications from the [DOF Building Classification Site](https://www.nyc.gov/assets/finance/jump/hlpbldgcode.html)"
    columns:
      - name: code,description,
        description: Code
        tests: [ unique, not_null ]
      - name: description
        description: Description
        tests: [ not_null ]
      - name: group_code
        description: Code for grouping building classes into broader categories
        tests: [ not_null ]
      - name: group_description
        description: Description for grouping building classes into broader categories
        tests: [ not_null ]

  - name: dof_building_classifications_modeling_site
    description: |
      "Building classifications from the [DOF Property Modeling Site](https://nycdepartmentoffinance.github.io/data_dictionary/building_classifications.html)
      The table includes a list of the building classifications and their corresponding descriptions, use, tax class, and model codes.
      Each observation is a unique combination of BC, TC, USE, and MODEL so if there are duplicate BCs it is because they correspond to multiple TCs or MODELs."
    columns:
      - name: bc
        description: Code
        tests: [ unique, not_null ]
      - name: description
        description: Description
        tests: [ not_null ]
      - name: use
        description: Use code
        tests: [ not_null ]
      - name: tc
        description: Tax class code
        tests: [ not_null ]
      - name: model
        description: Model code
        tests: [ not_null ]

  - name: lookup_lottype
    description: Lot type lookup table
    
  - name: zoning_district_class_descriptions
    description: Zoning district classification descriptions
