id: dcp_air_quality_vent_towers
acl: public-read

attributes:
  name: Air Vent Towers
  description: Air Vent Towers, manually compiled by DCP.

ingestion:
  target_crs: EPSG:4326
  source:
    type: s3
    bucket: edm-recipes
    key: inbox/dcp/dcp_air_quality_vent_towers/{{ version }}/vent_tower.zip
  file_format:
    type: shapefile
    unzipped_filename: vents.shp
    crs: EPSG:2263
  processing_steps:
  - name: clean_column_names
    args: { "replace": { " ": "_" }, "lower": True }
  - name: rename_columns
    args:
      map: { "geom": "wkb_geometry" }
