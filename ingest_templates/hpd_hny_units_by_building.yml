id: hpd_hny_units_by_building
# ! Temporary: sourcing HPD's pre-publication internal extract from `inbox` instead of
# ! Open Data, so 26Q2 can build before HPD publishes. Revert to the socrata source
# ! (and acl: public-read) once the dataset is live on Open Data.
acl: private

attributes:
  name: Housing New York Units by Building
  description: |
    The Department of Housing Preservation and Development (HPD) reports on buildings, units, 
    and projects that began after January 1, 2014 and are counted towards the Housing New York plan. 
    The Housing New York Units by Project file presents this data by project, and includes project-level data, 
    such as senior units, but does not include building-level data. 
    The unit counts are provided for each project, rather than by building. 
    For additional documentation, including a data dictionary, review the attachments in the 
    “About this Dataset” section of the Primer landing page.
  url: https://data.cityofnewyork.us/d/hg8x-zxpr

ingestion:
  source:
    type: s3
    bucket: edm-recipes
    key: inbox/hpd_hny_units_by_building/{{ version }}/hpd_hny_units_by_building_internal.csv
  file_format:
    type: csv
    dtype: str
    # HPD's extract is Windows-1252, not UTF-8 (en-dashes in project names).
    encoding: cp1252
  processing_steps:
    - name: clean_column_names
      args: { "replace": { " ": "_" }, "strip": True, "lower": True }
    # HPD's internal extract uses raw column names; Open Data applies its own display
    # names. Realign so the output schema matches prior versions — `_hny_union.sql`
    # unions this table with the historical one positionally, so arity and order matter.
    - name: rename_columns
      args:
        map:
          house_number: number
          street_name: street
          post_code: postcode
          nta: nta_-_neighborhood_tabulation_area
    # HPD's own geocoding notes; not present on Open Data.
    - name: drop_columns
      args:
        columns: [message]
    # ! Value-level cleanup (padding, thousands separators, '-' for null) is done in
    # ! products/developments/sql/_hny_union.sql rather than here, to avoid re-ingesting
    # ! the already-geocoded 20260721_internal version. Move it here when reverting.
