id: dcp_facilities
acl: public-read

attributes:
  name: Facilities Database (FacDB)
  description: >
    The Department of City Planning aggregates information about 30,000+ facilities and
    program sites that are owned, operated, funded, licensed, or certified by a City,
    State, or Federal agency in the City of New York into a central database called the
    City Planning Facilities Database (FacDB). These facilities generally help to shape
    quality of life in the city's neighborhoods, and this dataset is the basis for a
    series of planning activities. This public data resource allows all New Yorkers to
    understand the breadth of government resources in their neighborhoods. Note to
    Users: FacDB is only as good as the source data it aggregates, and the Department
    of City Planning cannot verify the accuracy of all records. This is the geocoded
    (points-only) subset - see dcp_facilities_with_unmapped for records without a
    geography.
  url: https://www.nyc.gov/content/planning/pages/resources/datasets/facilities

ingestion:
  target_crs: EPSG:4326
  source:
    type: file_download
    url: https://s-media.nyc.gov/agencies/dcp/assets/files/zip/data-tools/bytes/facilities-database/facilities_{{ version }}_shp.zip
  file_format:
    type: shapefile
    unzipped_filename: facilities_{{ version }}.shp
    crs: EPSG:2263
  processing_steps:
  - name: clean_column_names
    args: { "lower": True }
  - name: rename_columns
    args:
      map: { "geom": "wkb_geometry" }
