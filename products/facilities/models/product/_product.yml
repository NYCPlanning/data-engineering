models:
  - name: facdb_export
    columns:
      - name: '"UID"'
        tests: [ not_null, unique ]
      - name: '"DATASOURCE"'
        tests: [ not_null ]
      - name: '"FACNAME"'
        tests:
          - not_null:
              config:
                severity: error
                error_if: ">10"
      - name: '"FACTYPE"'
        tests:
          - not_null
          - many_to_one:
              parent_column: '"FACSUBGRP"'
      - name: '"FACSUBGRP"'
        tests: [ not_null ]
      - name: '"OPNAME"'
        tests:
          - not_null_if_other_not_null:
              other_column_name: '"OPABBREV"'
