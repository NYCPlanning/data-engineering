id: housing_database_by_2020_census_block

attributes:
  description: >-
    Net change in housing units arising from new buildings, demolitions, or alterations for NYC Census Blocks since 2010. The NYC
    Department of City Planning's (DCP) <a
    href="https://www1.nyc.gov/site/planning/data-maps/open-data/dwn-housing-database.page#housingdevelopmentproject">Housing
    Database</a> provide the 2010 census count of housing units, the net change in Class A housing units since the census, and the
    count of units pending completion for commonly used political and statistical boundaries. These tables are aggregated from the
    DCP Housing Database, which is derived from Department of Buildings (DOB)-approved housing construction and demolition jobs
    filed or completed in NYC since January 1, 2010. Net housing unit change is calculated as the sum of all three construction
    job types that add or remove residential units: new buildings, major alterations, and demolitions, and can be used to
    determine the change in legal housing units across time and space.

    All previously released versions of this data are available on the <a href="{{ bytes_url__housing_database }}">DCP Website: BYTES of the BIG APPLE</a>. Current version: {{ current_version_developments }}
  display_name: Housing Database by 2020 Census Block
  each_row_is_a: census block
  tags:
  - housing
  - house
  - building
  - development
  - dwelling unit
  - certificate of occupancy
  - co
  - permit
  - job application
  - filing
  - net units
  - unit change
  - pipeline
  - construction
  - census block
  - census tract
  - nta
  - puma
  - city council district
  - community district
  date_made_public: "4/7/2021"

assembly: []

custom: {}

destinations:
- id: socrata
  type: open_data
  files:
  - id: shapefile
    custom:
      destination_use: dataset_file
  - id: data_dictionary
    custom:
      destination_use: attachment
  custom:
    four_four: 8zyi-kxay
- id: bytes
  type: bytes
  files:
