services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NGINX_AUTH_USER=${NGINX_AUTH_USER}
      - NGINX_AUTH_PASSWORD=${NGINX_AUTH_PASSWORD}
      - NGINX_DOMAIN=${NGINX_DOMAIN}
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-_}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/http.conf.template:/etc/nginx/templates/http.conf.template:ro
      - ./nginx/conf.d/https.conf.template:/etc/nginx/templates/https.conf.template:ro
      - nginx-conf:/etc/nginx/conf.d
      - ./nginx/scripts/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: ["/docker-entrypoint.sh"]
    depends_on:
      - qa-streamlit
      - dagster
    restart: unless-stopped
    networks:
      - app-network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - app-network
    profiles:
      - production

  qa-streamlit:
    image: nycplanning/qa-streamlit:latest
    environment:
      - AWS_S3_ENDPOINT=${AWS_S3_ENDPOINT}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - BUILD_ENGINE_SERVER=${BUILD_ENGINE_SERVER}
      - GHP_TOKEN=${GHP_TOKEN}
      - PUBLISHING_BUCKET=edm-publishing
      - RECIPES_BUCKET=edm-recipes
      - PRODUCT_METADATA_REPO_PATH=/repos/product-metadata
      - SOCRATA_USER=${SOCRATA_USER}
      - SOCRATA_PASSWORD=${SOCRATA_PASSWORD}
    command: ["streamlit", "run", "/repos/data-engineering/apps/qa/src/index.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.baseUrlPath=/qaqc"]
    volumes:
      - /root/data-engineering:/repos/data-engineering
      - /root/product-metadata:/repos/product-metadata
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "8501"

  dagster:
    build:
      context: ./dagster
      dockerfile: Dockerfile
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
    volumes:
      - /root/data-engineering:/app/repos/data-engineering
      - /root/product-metadata:/app/repos/product-metadata
      - dagster-storage:/opt/dagster/dagster_home
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "3000"

volumes:
  dagster-storage:
    driver: local
  nginx-conf:
    driver: local
  certbot-webroot:
    driver: local
  certbot-certs:
    driver: local

networks:
  app-network:
    driver: bridge
