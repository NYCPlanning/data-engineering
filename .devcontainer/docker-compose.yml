version: "3"

services:
  de:
    container_name: de
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    env_file:
      - ../.env
    working_dir: /home/vscode/workspace
    volumes:
      - ..:/home/vscode/workspace:cached
    ports:
      - "8501:8501"
    tty: true
  postgis:
    container_name: postgis-db
    image: postgis/postgis:13-3.3-alpine
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
  sftp-server:
    # To test connection for a dev container terminal:
    # sftp -i .devcontainer/sftp/ssh_host_rsa_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=.devcontainer/sftp/known_hosts_integration_test dedev@sftp-server
    image: atmoz/sftp:alpine
    volumes:
      - ../.devcontainer/sftp/ssh_host_rsa_key_integration_test.pub:/etc/ssh/ssh_host_rsa_key.pub:ro
      - ../.devcontainer/sftp/ssh_host_rsa_key_integration_test:/etc/ssh/ssh_host_rsa_key:ro
      - ../.devcontainer/sftp/remote_files:/home/dedev/remote_files
    ports:
      - "2222:22"
    environment:
      SFTP_USERS: "dedev::1001"
