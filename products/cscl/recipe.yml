    custom:
      filename: ETL Working GDB.gdb.zip
      layer_name: NYPDBeat
  - name: dcp_cscl_gdb
    import_as: dcp_cscl_nypdprecinct
    custom:
      filename: ETL Working GDB.gdb.zip
      layer_name: NYPDPrecinct
  - name: dcp_cscl_gdb
    import_as: dcp_cscl_nypdpatrolborough
    custom:
      filename: ETL Working GDB.gdb.zip
      layer_name: NYPDPatrolBorough
  - name: dcp_cscl_gdb
