id: doi_evictions_geocoded
acl: public-read
depends_on:
  - doi_evictions

attributes:
  name: Department of Investigation - Evictions (Geocoded)
  description: >-
    This dataset contains DOI evictions data with enhanced geocoding using Geosupport.

    Records from doi_evictions have been geocoded where lat/lon were missing, using the
    eviction address and Geosupport. The dataset excludes the current year (incomplete data).

    This is now fully automated as an ingest dependency - it pulls from doi_evictions,
    geocodes missing addresses, and archives the results.

    Base data source: https://data.cityofnewyork.us/City-Government/Evictions/6z8x-wfk4
  url: https://data.cityofnewyork.us/City-Government/Evictions/6z8x-wfk4

ingestion:
  source:
    type: edm.recipes.datasets
    key: doi_evictions
    # version will be passed at runtime from Dagster partition
  file_format:
    type: parquet
  processing_steps:
  - name: python_script
    args:
      module: dcpy.lifecycle.scripts.doi_evictions_geocode
      function: process_evictions

columns:
- id: court_index_number
  data_type: text
- id: docket_number
  data_type: text
- id: eviction_address
  data_type: text
- id: eviction_apartment_number
  data_type: text
- id: executed_date
  data_type: text
- id: marshal_first_name
  data_type: text
- id: marshal_last_name
  data_type: text
- id: residential/commercial
  data_type: text
- id: borough
  data_type: text
- id: eviction_postcode
  data_type: text
- id: ejectment
  data_type: text
- id: eviction/legal_possession
  data_type: text
- id: latitude
  data_type: decimal
- id: longitude
  data_type: decimal
- id: community_board
  data_type: text
- id: council_district
  data_type: text
- id: census_tract
  data_type: text
- id: bin
  data_type: text
- id: bbl
  data_type: text
- id: nta
  data_type: text
- id: year
  data_type: text
- id: borough_name
  data_type: text
- id: puma
  data_type: text
  description: PUMA code from Geosupport geocoding
